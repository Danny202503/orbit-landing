<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to ORBIT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fbf9f8; }
        .signature-gradient { background: linear-gradient(135deg, #cbd5e1 0%, #6b38d4 50%, #4b41e1 100%); }
        .signature-text-gradient { background: linear-gradient(135deg, #94a3b8 0%, #6b38d4 50%, #4b41e1 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="bg-white p-10 rounded-[2rem] shadow-xl w-full max-w-md border border-gray-100">
        <div class="flex justify-center mb-8">
             <div class="flex items-center gap-2">
                 <div class="w-8 h-8 rounded-full signature-gradient shadow-md"></div>
                 <span class="font-bold text-transparent bg-clip-text signature-text-gradient text-2xl tracking-tight">ORBIT</span>
             </div>
        </div>

        <h2 class="text-2xl font-bold text-center text-gray-900 mb-2">Welcome back</h2>
        <p class="text-center text-gray-500 mb-8 text-sm">Enter your credentials to access the command center.</p>

        <form id="login-form">
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-2">Email</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#6b38d4] focus:ring-1 focus:ring-[#6b38d4] outline-none transition-all bg-gray-50 focus:bg-white" placeholder="admin@hotel.com" required>
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#6b38d4] focus:ring-1 focus:ring-[#6b38d4] outline-none transition-all bg-gray-50 focus:bg-white" placeholder="••••••••" required>
            </div>
            <div class="flex items-center justify-between mb-8">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 text-[#6b38d4] rounded border-gray-300">
                    <span class="text-sm text-gray-600 font-medium">Remember me</span>
                </label>
                <a href="#" class="text-sm text-[#6b38d4] hover:text-[#4b41e1] font-bold">Forgot password?</a>
            </div>
            <button type="submit" id="login-btn" class="w-full signature-gradient text-white py-4 rounded-xl font-bold shadow-lg hover:opacity-90 transition-opacity active:scale-95">Log In to Dashboard</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ⚠️ 주의: 어제 발급받으신 파이어베이스 Config 키값을 여기에 넣어야 실제 작동합니다!
        // (지금은 임시로 비워두었으며, 아래의 '마스터키' 로직으로 먼저 테스트합니다)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); // 기본 새로고침 방지
            loginBtn.innerText = 'Authenticating...'; // 버튼 텍스트 변경 (로딩 효과)

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // 🌟 프로토타입 시연을 위한 '마스터 키' (Firebase 키를 아직 안 넣었을 때를 대비)
            if(email === "admin@orbit.com" && password === "12341234") {
                alert("🚀 [마스터 키 승인] ORBIT 통제실로 이동합니다!");
                window.location.href = "https://visionary-monstera-f0b44c.netlify.app";
                return;
            }

            // 진짜 파이어베이스 인증 로직
            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    alert("🚀 로그인 성공! 통제실로 이동합니다.");
                    window.location.href = "https://visionary-monstera-f0b44c.netlify.app";
                })
                .catch((error) => {
                    console.error(error);
                    alert("⚠️ 로그인 실패: 파이어베이스 Config 키가 아직 입력되지 않았거나, 계정 정보가 틀렸습니다.\n(테스트용 마스터키를 사용해보세요: admin@orbit.com / 12341234)");
                    loginBtn.innerText = 'Log In to Dashboard';
                });
        });
    </script>
</body>
</html>
